<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Invoicebillers – Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g:#22c55e;--bg:#060a06;--s1:#0d120d;--s2:#131a13;
  --border:rgba(34,197,94,0.12);--border2:rgba(255,255,255,0.07);
  --text:#e2ebe2;--muted:#6b7f6b;--white:#fff;
  --red:#ef4444;--amber:#f59e0b;--fn:'Plus Jakarta Sans',sans-serif;
}
html,body{height:100%;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:var(--fn);}

/* ── LOGIN SCREEN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100svh;padding:1.5rem;}
.login-box{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:2rem;width:100%;max-width:380px;}
.login-logo{display:flex;align-items:center;gap:0.6rem;margin-bottom:1.8rem;justify-content:center;}
.login-mark{width:36px;height:36px;background:var(--g);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.85rem;color:#000;}
.login-name{font-weight:800;font-size:1.1rem;color:var(--white);}
.login-ttl{font-weight:800;font-size:1.2rem;text-align:center;margin-bottom:0.3rem;}
.login-sub{text-align:center;color:var(--muted);font-size:0.82rem;margin-bottom:1.5rem;}
.inp{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:0.72rem 0.9rem;color:var(--text);font-family:var(--fn);font-size:0.9rem;outline:none;transition:border-color 0.2s;margin-bottom:0.7rem;}
.inp:focus{border-color:rgba(34,197,94,0.4);}
.inp-err{border-color:rgba(239,68,68,0.4)!important;}
.login-btn{width:100%;background:var(--g);color:#000;border:none;padding:0.85rem;border-radius:10px;font-family:var(--fn);font-weight:700;font-size:0.95rem;cursor:pointer;transition:opacity 0.2s;margin-top:0.3rem;}
.login-btn:hover{opacity:0.88;}
.login-err{color:var(--red);font-size:0.8rem;text-align:center;margin-top:0.6rem;display:none;}

/* ── DASHBOARD ── */
#dashboard{display:none;min-height:100svh;}
.top-bar{position:sticky;top:0;z-index:80;background:rgba(6,10,6,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:58px;}
.top-logo{display:flex;align-items:center;gap:0.6rem;}
.top-mark{width:30px;height:30px;background:var(--g);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.75rem;color:#000;}
.top-title{font-weight:800;font-size:0.95rem;color:var(--white);}
.top-badge{font-size:0.65rem;color:var(--amber);font-weight:700;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.2);padding:0.2rem 0.6rem;border-radius:100px;letter-spacing:0.04em;}
.logout-link{background:none;border:none;color:var(--muted);cursor:pointer;font-family:var(--fn);font-size:0.82rem;font-weight:600;}
.logout-link:hover{color:var(--red);}
.page-inner{max-width:960px;margin:0 auto;padding:1.5rem 1.2rem;}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0.7rem;margin-bottom:1.5rem;}
@media(min-width:640px){.stats-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center;}
.stat-n{font-size:2rem;font-weight:800;line-height:1;letter-spacing:-0.04em;}
.stat-l{font-size:0.65rem;color:var(--muted);margin-top:0.25rem;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}
.s-total{color:var(--g);}
.s-pending{color:var(--amber);}
.s-approved{color:var(--g);}
.s-rejected{color:var(--red);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.filter-btn{padding:0.45rem 1rem;border-radius:8px;border:1px solid var(--border2);background:var(--s2);color:var(--muted);cursor:pointer;font-family:var(--fn);font-size:0.8rem;font-weight:600;transition:all 0.2s;}
.filter-btn:hover{border-color:var(--border);color:var(--text);}
.filter-btn.active{background:var(--g);color:#000;border-color:var(--g);}

/* ── REQUEST CARDS ── */
.req-list{display:flex;flex-direction:column;gap:0.7rem;}
.req-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:1.2rem;transition:border-color 0.2s;}
.req-card:hover{border-color:rgba(34,197,94,0.25);}
.req-top{display:flex;align-items:flex-start;justify-content:space-between;gap:0.8rem;margin-bottom:0.9rem;}
.req-av{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#16a34a,#22c55e);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;color:#000;flex-shrink:0;}
.req-info{flex:1;min-width:0;}
.req-name{font-weight:800;font-size:0.95rem;color:var(--white);}
.req-shop{font-size:0.78rem;color:var(--muted);margin-top:0.1rem;}
.req-meta{display:flex;flex-wrap:wrap;gap:0.5rem;font-size:0.72rem;color:var(--muted);margin-top:0.5rem;}
.req-meta span{display:flex;align-items:center;gap:0.25rem;}
.status-badge{font-size:0.65rem;font-weight:700;padding:0.2rem 0.65rem;border-radius:100px;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap;}
.sb-pending{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2);}
.sb-approved{background:rgba(34,197,94,0.12);color:var(--g);border:1px solid rgba(34,197,94,0.2);}
.sb-rejected{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.req-actions{display:flex;gap:0.5rem;flex-wrap:wrap;}
.act-btn{flex:1;min-width:80px;padding:0.55rem 0.8rem;border-radius:9px;border:none;cursor:pointer;font-family:var(--fn);font-weight:700;font-size:0.78rem;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:0.3rem;}
.act-approve{background:rgba(34,197,94,0.12);color:var(--g);border:1px solid rgba(34,197,94,0.2);}
.act-approve:hover{background:var(--g);color:#000;}
.act-reject{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.act-reject:hover{background:var(--red);color:#fff;}
.act-delete{background:var(--s2);color:var(--muted);border:1px solid var(--border2);}
.act-delete:hover{color:var(--red);border-color:rgba(239,68,68,0.3);}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted);}
.empty-ico{font-size:2.5rem;margin-bottom:0.8rem;}
.empty-ttl{font-weight:700;color:var(--text);margin-bottom:0.3rem;}
.loading{text-align:center;padding:2.5rem;color:var(--muted);}
.loading::after{content:'';display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--g);border-radius:50%;animation:spin 0.7s linear infinite;margin-left:0.5rem;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:1rem;}
.search-inp{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:0.72rem 0.9rem 0.72rem 2.4rem;color:var(--text);font-family:var(--fn);font-size:0.88rem;outline:none;transition:border-color 0.2s;}
.search-inp:focus{border-color:rgba(34,197,94,0.4);}
.search-ico{position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.9rem;pointer-events:none;}

/* ── TOAST ── */
#toast{display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);padding:0.7rem 1.5rem;border-radius:100px;font-weight:700;font-size:0.85rem;z-index:999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,0.5);font-family:var(--fn);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-mark">IB</div>
      <div class="login-name">Invoicebillers</div>
    </div>
    <div class="login-ttl">Admin Panel</div>
    <div class="login-sub">Sign in to manage user requests</div>
    <input class="inp" type="email" id="aEmail" placeholder="Admin email" onkeydown="if(event.key==='Enter')doLogin()"/>
    <input class="inp" type="password" id="aPass" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <div class="login-err" id="loginErr"></div>
    <button class="login-btn" onclick="doLogin()">🔐 Sign In</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="top-bar">
    <div class="top-logo">
      <div class="top-mark">IB</div>
      <div class="top-title">Admin Panel</div>
      <span class="top-badge">ADMIN</span>
    </div>
    <button class="logout-link" onclick="adminLogout()">Sign Out</button>
  </div>

  <div class="page-inner">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-n s-total" id="cnt-total">–</div><div class="stat-l">Total</div></div>
      <div class="stat-card"><div class="stat-n s-pending" id="cnt-pending">–</div><div class="stat-l">Pending</div></div>
      <div class="stat-card"><div class="stat-n s-approved" id="cnt-approved">–</div><div class="stat-l">Approved</div></div>
      <div class="stat-card"><div class="stat-n s-rejected" id="cnt-rejected">–</div><div class="stat-l">Rejected</div></div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-inp" type="text" id="searchInp" placeholder="Search by name, email, shop…" oninput="renderRequests()"/>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <button class="filter-btn active" id="f-all"      onclick="setFilter('all')">All</button>
      <button class="filter-btn"        id="f-pending"  onclick="setFilter('pending')">⏳ Pending</button>
      <button class="filter-btn"        id="f-approved" onclick="setFilter('approved')">✅ Approved</button>
      <button class="filter-btn"        id="f-rejected" onclick="setFilter('rejected')">❌ Rejected</button>
    </div>

    <div class="req-list" id="reqList"><div class="loading">Loading requests</div></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp }  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, updateDoc, deleteDoc, doc,
  query, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ══════════════════════════════════════════════
//  🔧 PASTE YOUR FIREBASE CONFIG HERE
// ══════════════════════════════════════════════
 const firebaseConfig = {
  apiKey: "AIzaSyAaAtC56I7n5D8JTJEOdBZNnFnQktIz96k",
  authDomain: "invoicebillers.firebaseapp.com",
  projectId: "invoicebillers",
  storageBucket: "invoicebillers.firebasestorage.app",
  messagingSenderId: "921352095208",
  appId: "1:921352095208:web:e1841dbdb7cfba1c74105d"
};
// ══════════════════════════════════════════════

// ── CHANGE THESE CREDENTIALS ──
 const ADMIN_EMAIL = "sj.sreenath.official@gmail.com";
  const ADMIN_PASS  = "Kannasj@24Achyut04";
// ─────────────────────────────

let db;
try {
  const fbApp = initializeApp(firebaseConfig);
  db = getFirestore(fbApp);
} catch(e) { console.error('Firebase init:', e); }

let requests = [];
let currentFilter = 'all';
let unsubReqs = null;

// ── LOGIN ──
window.doLogin = function() {
  const email = document.getElementById('aEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('aPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';
  if (email !== ADMIN_EMAIL.toLowerCase() || pass !== ADMIN_PASS) {
    errEl.textContent = '❌ Invalid credentials';
    errEl.style.display = 'block';
    document.getElementById('aPass').classList.add('inp-err');
    return;
  }
  sessionStorage.setItem('ib_admin', '1');
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  loadRequests();
};

window.adminLogout = function() {
  if (unsubReqs) unsubReqs();
  sessionStorage.removeItem('ib_admin');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display   = 'none';
};

// ── Auto-login if session exists ──
if (sessionStorage.getItem('ib_admin')) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display   = 'block';
  loadRequests();
}

// ── LOAD REQUESTS (real-time, no composite index needed) ──
function sortReqs(arr) {
  return arr.sort((a,b) => {
    const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : (a.createdAt?.seconds||0)*1000;
    const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : (b.createdAt?.seconds||0)*1000;
    return tb - ta;
  });
}

function loadRequests() {
  if (!db) {
    document.getElementById('reqList').innerHTML = '<div class="empty"><div class="empty-ico">⚠️</div><div class="empty-ttl">Firebase not configured</div><div class="empty-sub">Paste your Firebase config in admin.html</div></div>';
    return;
  }
  try {
    const q = collection(db,'requests'); // no orderBy — sort in JS
    unsubReqs = onSnapshot(q, snap => {
      requests = sortReqs(snap.docs.map(d => ({id:d.id,...d.data()})));
      updateStats(); renderRequests();
    }, err => { fetchRequestsOnce(); });
  } catch(e) { fetchRequestsOnce(); }
}

async function fetchRequestsOnce() {
  if (!db) return;
  try {
    const snap = await getDocs(collection(db,'requests'));
    requests = sortReqs(snap.docs.map(d => ({id:d.id,...d.data()})));
    updateStats(); renderRequests();
  } catch(e) { showToast('❌ Failed to load requests','#ef4444','#fff'); }
}

function updateStats() {
  document.getElementById('cnt-total').textContent    = requests.length;
  document.getElementById('cnt-pending').textContent  = requests.filter(r=>r.status==='pending').length;
  document.getElementById('cnt-approved').textContent = requests.filter(r=>r.status==='approved').length;
  document.getElementById('cnt-rejected').textContent = requests.filter(r=>r.status==='rejected').length;
}

// ── RENDER ──
window.renderRequests = function() {
  const search = (document.getElementById('searchInp').value||'').toLowerCase();
  let list = requests.filter(r => {
    if (currentFilter !== 'all' && r.status !== currentFilter) return false;
    if (search) {
      const hay = [r.name,r.email,r.shop,r.biz,r.phone].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const el = document.getElementById('reqList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><div class="empty-ttl">No requests found</div><div class="empty-sub">Try adjusting your filter or search</div></div>';
    return;
  }

  el.innerHTML = list.map(r => {
    const sc = {pending:'sb-pending',approved:'sb-approved',rejected:'sb-rejected'}[r.status]||'sb-pending';
    const dt = r.createdAt?.toDate ? r.createdAt.toDate() : new Date();
    const av = (r.name||'?')[0].toUpperCase();
    const canApprove  = r.status !== 'approved';
    const canReject   = r.status !== 'rejected';
    return `<div class="req-card" id="rc-${r.id}">
      <div class="req-top">
        <div style="display:flex;gap:0.8rem;align-items:flex-start;flex:1;min-width:0;">
          <div class="req-av">${esc(av)}</div>
          <div class="req-info">
            <div class="req-name">${esc(r.name||'—')}</div>
            <div class="req-shop">🏪 ${esc(r.shop||'—')} · ${esc(r.biz||'—')}</div>
            <div class="req-meta">
              <span>📧 ${esc(r.email||'—')}</span>
              <span>📱 ${esc(r.phone||'—')}</span>
              <span>🕐 ${dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
            </div>
          </div>
        </div>
        <span class="status-badge ${sc}">${r.status||'pending'}</span>
      </div>
      <div class="req-actions">
        ${canApprove?`<button class="act-btn act-approve" onclick="approveReq('${r.id}')">✅ Approve</button>`:''}
        ${canReject ?`<button class="act-btn act-reject"  onclick="rejectReq('${r.id}')">${r.status==='approved'?'🔄 Revoke':'❌ Reject'}</button>`:''}
        <button class="act-btn act-delete" onclick="deleteReq('${r.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
};

// ── ACTIONS ──
window.approveReq = async function(id) {
  try {
    await updateDoc(doc(db,'requests',id), {status:'approved'});
    const r = requests.find(r=>r.id===id); if(r) r.status='approved';
    updateStats(); renderRequests();
    showToast('✅ Request approved!','#22c55e','#000');
  } catch(e) { showToast('❌ '+e.message,'#ef4444','#fff'); }
};

window.rejectReq = async function(id) {
  if (!confirm('Reject/revoke this user?')) return;
  try {
    await updateDoc(doc(db,'requests',id), {status:'rejected'});
    const r = requests.find(r=>r.id===id); if(r) r.status='rejected';
    updateStats(); renderRequests();
    showToast('❌ Request rejected','#f59e0b','#000');
  } catch(e) { showToast('❌ '+e.message,'#ef4444','#fff'); }
};

window.deleteReq = async function(id) {
  if (!confirm('Permanently delete this request? This cannot be undone.')) return;
  try {
    await deleteDoc(doc(db,'requests',id));
    requests = requests.filter(r=>r.id!==id);
    updateStats(); renderRequests();
    showToast('🗑 Request deleted','#f59e0b','#000');
  } catch(e) { showToast('❌ '+e.message,'#ef4444','#fff'); }
};

// ── Filter ──
window.setFilter = function(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  renderRequests();
};

// ── Toast ──
let _tt;
function showToast(msg,bg,col){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=bg;t.style.color=col;
  t.style.display='block';clearTimeout(_tt);_tt=setTimeout(()=>t.style.display='none',3500);
}
window.showToast = showToast;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
window.esc = esc;
</script>
</body>
</html>
